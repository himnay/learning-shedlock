spring:
  application:
    name: learning-shedlock
  profiles:
    active: local
  threads:
    virtual:
      enabled: true
  mvc:
    problemdetails:
      enabled: true
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:shedlock_db}
    username: ${POSTGRES_USER:shedlock}
    password: ${POSTGRES_PASSWORD:shedlock}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: ShedlockHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    baseline-description: initial
    table: flyway_schema_history

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,scheduledtasks
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
    info:
      enabled: true
  info:
    git:
      mode: full
    build:
      enabled: true
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms,100ms,200ms,300ms,500ms,1s,2s,5s

shedlock:
  default-lock-at-most-for: 30s
  default-lock-at-least-for: 10s
  keep-alive-enabled: true
  report:
    lock-name: reportScheduler
    cron: "0 */1 * * * *"
    lock-at-most-for: 30s
    lock-at-least-for: 10s
  cleanup:
    lock-name: cleanupScheduler
    fixed-rate-ms: 60000
    lock-at-most-for: 5m
    lock-at-least-for: 1m
  notification:
    lock-name: notificationScheduler
    cron: "0 */2 * * * *"
    lock-at-most-for: 30s
    lock-at-least-for: 10s
    enabled: true
  custom-lock:
    lock-name: customLockScheduler
    fixed-rate-ms: 90000
    lock-at-most-for: 1m
    lock-at-least-for: 1m

info:
  app:
    name: ${spring.application.name}
    description: Spring Boot ShedLock — distributed scheduler locking with JDBC, Postgres, Flyway
    version: 0.0.1-SNAPSHOT

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.org.shedlock: DEBUG
    net.javacrumbs.shedlock: DEBUG
    org.springframework.scheduling: INFO
